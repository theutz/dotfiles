version: 0.7.7
config:
  verbose: false
  aliasesonly: false
  mode: 0
commands:
  dotfiles:
    keypath: dotfiles
    name: echo 'Dotfiles Tools'
    alias: dotfiles
    aliasonly: false
    description: ""
    commands:
      edit:
        keypath: dotfiles.edit
        name: ${EDITOR} ${DOTFILES_DIR}
        alias: edit
        aliasonly: false
        description: Open the dotfiles directory in EDITOR
        commands:
          nostromo:
            keypath: dotfiles.edit.nostromo
            name: ${EDITOR} ${DOTFILES_DIR}/nostromo/.nostromo/manifest.yaml
            alias: nostromo
            aliasonly: false
            description: Edit Nostromo manifest
            commands: {}
            subs: {}
            code:
              language: ""
              snippet: ""
            mode: 2
          tmux:
            keypath: dotfiles.edit.tmux
            name: ${EDITOR} ${DOTFILES_DIR}/tmux/.tmux.conf
            alias: tmux
            aliasonly: false
            description: Edit TMUX configuration
            commands: {}
            subs: {}
            code:
              language: ""
              snippet: ""
            mode: 2
          vimrc:
            keypath: dotfiles.edit.vimrc
            name: ${EDITOR} ${DOTFILES_DIR}/vim/.vimrc
            alias: vimrc
            aliasonly: false
            description: Edit .vimrc
            commands: {}
            subs: {}
            code:
              language: ""
              snippet: ""
            mode: 2
          zprofile:
            keypath: dotfiles.edit.zprofile
            name: ${EDITOR} ${DOTFILES_DIR}/zsh/.zprofile
            alias: zprofile
            aliasonly: false
            description: Edit .zprofile
            commands: {}
            subs: {}
            code:
              language: ""
              snippet: ""
            mode: 2
          zsh:
            keypath: dotfiles.edit.zsh
            name: ${EDITOR} ${DOTFILES_DIR}/zsh
            alias: zsh
            aliasonly: false
            description: Edit ZSH related dotfiles
            commands: {}
            subs: {}
            code:
              language: ""
              snippet: ""
            mode: 2
          zshrc:
            keypath: dotfiles.edit.zshrc
            name: ${EDITOR} ${DOTFILES_DIR}/zsh/.zshrc
            alias: zshrc
            aliasonly: false
            description: Edit .zshrc
            commands: {}
            subs: {}
            code:
              language: ""
              snippet: ""
            mode: 2
        subs: {}
        code:
          language: ""
          snippet: ""
        mode: 2
      go:
        keypath: dotfiles.go
        name: cd ${DOTFILES_DIR}/
        alias: go
        aliasonly: false
        description: Navigate to dotfiles folder
        commands:
          vim:
            keypath: dotfiles.go.vim
            name: cd ${DOTFILES_DIR}/vim
            alias: vim
            aliasonly: false
            description: Change directory to vim files
            commands: {}
            subs: {}
            code:
              language: ""
              snippet: ""
            mode: 2
          zsh:
            keypath: dotfiles.go.zsh
            name: cd ${DOTFILES_DIR}/zsh
            alias: zsh
            aliasonly: false
            description: Change directory to zsh files
            commands: {}
            subs: {}
            code:
              language: ""
              snippet: ""
            mode: 2
        subs: {}
        code:
          language: ""
          snippet: ""
        mode: 0
    subs: {}
    code:
      language: ""
      snippet: ""
    mode: 0
  dt:
    keypath: dt
    name: dotfiles
    alias: dt
    aliasonly: true
    description: Shortcut for Dotfiles Tools
    commands: {}
    subs: {}
    code:
      language: ""
      snippet: ""
    mode: 2
