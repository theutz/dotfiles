# List Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-fpp'
set -g @plugin 'tmux-plugins/tmux-urlview'
#set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'sainnhe/tmux-fzf'

# Set Options
set -g @themepack 'powerline/default/blue'
set -g @continuum-restore 'on'
set -g mouse on

# Make sure spaceduck theme works correctly with vim
set -g terminal-overrides ',xterm-256color:Tc'
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:sitm=\E[3m'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Personal settings
setw -g mode-keys vi
set -g default-shell "/usr/local/bin/zsh"

# Personal Keybindings
bind-key M-g popup -w 100 -h 90% -E lazygit
bind-key M-v popup -w 100 -h 90% -E "nvim ~/.vimrc"
bind-key M-t popup -w 100 -h 90% -E "nvim ~/.tmux.conf"\; source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded!'
bind-key M-z popup -w 100 -h 90% -E "nvim ~/.zshrc ~/.zprofile ~/.zpreztorc ~/.zshenv"
bind-key M-y popup -w 100 -h 90% -E "nvim ~/.config/yadm/bootstrap"
bind-key M-m command-prompt -p "Search man:" 'popup -E "man %%"'
bind-key r source-file ~/.tmux.conf \; display-message '~/.tmux.conf reloaded!'
TMUX_FZF_LAUNCH_KEY="C-f"
bind-key c command-prompt "new-window -n %%"

# Generated from Tmuxline.vim
source "$HOME/.tmux-theme.conf"
